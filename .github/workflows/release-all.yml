name: Release All Platforms

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (e.g. 1.2.4)
        required: true
      gitee_repo:
        description: Gitee source URL (no credentials)
        required: false
        default: https://gitee.com/psvmc/z-3d-anti-motion-wpf.git

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Clone from Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_REPO: ${{ inputs.gitee_repo }}
          RELEASE_TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          GITEE_TOKEN="$(printf '%s' "${GITEE_TOKEN}" | tr -d '\r\n' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          if [ -z "${GITEE_TOKEN}" ]; then
            echo "::error::GITEE_TOKEN is empty. Run: gh secret set GITEE_TOKEN -R psvmc/z-3d-anti-motion-wpf-releases --body \"YOUR_GITEE_TOKEN\""
            exit 1
          fi
          REPO_PATH="${GITEE_REPO#https://}"
          REPO_PATH="${REPO_PATH#http://}"
          CLONE_URL="https://${REPO_PATH}"
          export GITEE_TOKEN

          git config --global http.postBuffer 524288000
          git config --global http.version HTTP/1.1

          TAG_CANDIDATES=("$RELEASE_TAG")
          if [[ "$RELEASE_TAG" == v* ]]; then
            TAG_CANDIDATES+=("${RELEASE_TAG#v}")
          else
            TAG_CANDIDATES+=("v${RELEASE_TAG}")
          fi

          clone_ok=false
          last_err=""
          for TAG in "${TAG_CANDIDATES[@]}"; do
            for attempt in 1 2 3; do
              echo "Cloning tag ${TAG} (attempt ${attempt})..."
              rm -rf repo
              set +e
              err=$(
                GIT_TERMINAL_PROMPT=0 git -c credential.helper= \
                  -c "credential.helper=!f() { echo username=oauth2; echo password=${GITEE_TOKEN}; }; f" \
                  clone --depth 1 --branch "$TAG" "$CLONE_URL" repo 2>&1
              )
              code=$?
              set -e
              if [ "$code" -eq 0 ]; then
                echo "Cloned tag ${TAG}"
                clone_ok=true
                break 2
              fi
              last_err="$err"
              echo "$err"
              sleep $((attempt * 5))
            done
          done

          if [ "$clone_ok" != true ]; then
            echo "::error::Failed to clone tag ${RELEASE_TAG} from Gitee."
            echo "::error::Check: 1) git push origin ${RELEASE_TAG#v}  2) GITEE_TOKEN valid (projects scope)  3) gh secret set GITEE_TOKEN --body"
            if [ -n "$last_err" ]; then
              echo "::error::Git said: ${last_err}"
            fi
            exit 1
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install NSIS
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          choco install nsis -y --no-progress
          if ($LASTEXITCODE -ne 0) {
            throw "Chocolatey install nsis failed with exit code $LASTEXITCODE"
          }

          $candidates = @(
            (Join-Path ${env:ProgramFiles(x86)} 'NSIS\Bin\makensis.exe'),
            (Join-Path ${env:ProgramFiles(x86)} 'NSIS\makensis.exe'),
            (Join-Path $env:ProgramFiles 'NSIS\Bin\makensis.exe'),
            (Join-Path $env:ProgramFiles 'NSIS\makensis.exe')
          )
          if ($env:ChocolateyInstall) {
            $candidates += Join-Path $env:ChocolateyInstall 'lib\nsis\tools\makensis.exe'
          }

          $makensis = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $makensis) {
            $found = Get-ChildItem -Path @(
              ${env:ProgramFiles(x86)},
              $env:ProgramFiles,
              $env:ChocolateyInstall
            ) -Filter makensis.exe -Recurse -ErrorAction SilentlyContinue |
              Select-Object -First 1 -ExpandProperty FullName
            if ($found) {
              $makensis = $found
            }
          }

          if (-not $makensis) {
            throw 'makensis.exe not found after NSIS install'
          }

          $nsisDir = Split-Path -Parent $makensis
          Add-Content -Path $env:GITHUB_PATH -Value $nsisDir
          Write-Host "NSIS directory: $nsisDir"
          & $makensis /VERSION

      - name: Build NSIS installer
        working-directory: repo
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not (Get-Command makensis -ErrorAction SilentlyContinue)) {
            throw 'makensis not found in PATH after NSIS install'
          }

          New-Item -ItemType Directory -Force -Path release, dist, publish\win-x64 | Out-Null

          dotnet publish ZAntiMotion.csproj `
            -c Release `
            -r win-x64 `
            --self-contained false `
            -p:PublishSingleFile=true `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -o publish\win-x64

          $exe = Get-ChildItem -Path publish\win-x64 -Filter *.exe |
            Where-Object { $_.Name -ne 'createdump.exe' } |
            Select-Object -First 1
          if (-not $exe) {
            throw 'Published exe not found'
          }

          $installer = Join-Path (Resolve-Path dist) 'ZAntiMotion-amd64-installer.exe'
          & makensis /INPUTCHARSET UTF8 `
            -DINSTALL_SCOPE=user `
            "-DAPP_BINARY=$($exe.FullName)" `
            "-DOUT_FILE=$installer" `
            'build\windows\nsis\project.nsi'
          if ($LASTEXITCODE -ne 0) {
            throw "makensis failed with exit code $LASTEXITCODE"
          }

          Copy-Item $installer release\ -Force
          Get-ChildItem release | Format-Table Name, Length

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: repo/release/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Generate changelog from git tags
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_REPO: ${{ inputs.gitee_repo }}
          RELEASE_TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          GITEE_TOKEN="$(printf '%s' "${GITEE_TOKEN}" | tr -d '\r\n' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          if [ -z "${GITEE_TOKEN}" ]; then
            echo "::error::GITEE_TOKEN is empty."
            exit 1
          fi
          REPO_PATH="${GITEE_REPO#https://}"
          REPO_PATH="${REPO_PATH#http://}"
          CLONE_URL="https://${REPO_PATH}"

          git config --global http.postBuffer 524288000
          git config --global http.version HTTP/1.1

          clone_for_changelog() {
            GIT_TERMINAL_PROMPT=0 git -c credential.helper= \
              -c "credential.helper=!f() { echo username=oauth2; echo password=${GITEE_TOKEN}; }; f" \
              "$@"
          }

          clone_ok=false
          last_err=""
          for attempt in 1 2 3; do
            echo "Cloning for changelog (attempt ${attempt})..."
            rm -rf repo
            set +e
            err=$(
              clone_for_changelog -c protocol.version=2 \
                clone --filter=blob:none --tags --no-checkout "$CLONE_URL" repo 2>&1
            )
            code=$?
            set -e
            if [ "$code" -eq 0 ]; then
              echo "Cloned for changelog (partial)"
              clone_ok=true
              break
            fi
            last_err="$err"
            echo "$err"
            sleep $((attempt * 5))
          done

          if [ "$clone_ok" != true ]; then
            echo "Partial clone failed, trying full clone..."
            rm -rf repo
            set +e
            err=$(
              clone_for_changelog clone --tags --no-checkout "$CLONE_URL" repo 2>&1
            )
            code=$?
            set -e
            if [ "$code" -eq 0 ]; then
              echo "Cloned for changelog (full)"
              clone_ok=true
            else
              last_err="$err"
            fi
          fi

          if [ "$clone_ok" != true ]; then
            echo "::error::Failed to clone for changelog."
            if [ -n "$last_err" ]; then
              echo "::error::Git said: ${last_err}"
            fi
            exit 1
          fi

          cd repo

          resolve_tag() {
            local tag="$1"
            for candidate in "$tag" "${tag#v}" "v${tag#v}"; do
              if git rev-parse "refs/tags/${candidate}" >/dev/null 2>&1; then
                echo "$candidate"
                return 0
              fi
            done
            return 1
          }

          CURRENT_TAG="$(resolve_tag "$RELEASE_TAG")" || {
            echo "::error::Tag ${RELEASE_TAG} not found on Gitee."
            exit 1
          }

          PREV_TAG="$(git tag -l --sort=-version:refname | awk -v cur="$CURRENT_TAG" '$0==cur {getline; print; exit}')"
          if [ -z "$PREV_TAG" ]; then
            RANGE="$CURRENT_TAG"
            HEADER="## 变更 (${CURRENT_TAG})"
            LOG="- 首个发布版本"
          else
            RANGE="${PREV_TAG}..${CURRENT_TAG}"
            HEADER="## 变更 (${PREV_TAG} → ${CURRENT_TAG})"
            LOG=$(git log "$RANGE" --pretty=format:"- %s (%h)" --no-merges)
            if [ -z "$LOG" ]; then
              LOG="- 无 commit 变更（可能仅有 tag 移动）"
            fi
          fi

          {
            printf '%s\n\n' "$HEADER"
            printf '%s\n' "$LOG"
          } > "$GITHUB_WORKSPACE/release-notes.md"
          echo "Changelog for ${RANGE}:"
          cat "$GITHUB_WORKSPACE/release-notes.md"

      - name: Verify release notes
        run: test -s release-notes.md

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release files
        run: find dist -type f -ls

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          target_commitish: main
          name: 3D防眩晕辅助 ${{ inputs.tag }}
          body_path: release-notes.md
          files: dist/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
